# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.12.10b0"
  python_check_max: "3.14"

package:
  name: mplfinance
  version: ${{ version }}

source:
  - target_directory: dist
    url: https://pypi.io/packages/source/m/mplfinance/mplfinance-${{ version }}.tar.gz
    sha256: 7da150b5851aa5119ad6e06b55e48338b619bb6773f1b85df5de67a5ffd917bf
  - target_directory: src
    url: https://github.com/matplotlib/mplfinance/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 1703ea263d7de3b7e72825265de346ff1f050f8ffcb52210a044c1971fdd513a

build:
  number: 0
  noarch: python
  script:
    - cd dist
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
  run:
    - matplotlib-base
    - pandas
    - python >=${{ python_min }}

tests:
  - python:
      imports: mplfinance
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - files:
      source:
        - src/tests/
    requirements:
      run:
        - python ${{ python_min }}.*
        - pytest-cov
    script:
      - cd src
      - coverage run --source=mplfinance --branch -m pytest -vv --tb=long --color=yes
      - coverage report --show-missing --skip-covered --fail-under=100

about:
  license: LicenseRef-BSD-like
  license_file: dist/LICENSE
  summary: Utilities for the visualization, and visual analysis, of financial data
  homepage: https://pypi.org/project/mplfinance
  repository: http://github.com/matplotlib/mplfinance

extra:
  recipe-maintainers:
    - DanielGoldfarb
    - bollwyvl
